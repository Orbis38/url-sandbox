{% extends 'admin/master.html' %}
{% block body %}
{{ super() }}
<div class="up-report-wrap">
   <a class="up-back" href="/queue/">&larr; Back to queue</a>
   <div class="card new_card">
      <div class="card-header">
         <div class="div-left">Analysis Report &mdash; {{ task_id }}</div>
         <div class="div-right"></div>
      </div>
      <div class="card-body width100 task-details">
         {% if report_body %}
         {{ report_body | safe }}
         {% else %}
         <div style="color:var(--up-muted);padding:24px" class="text-center">
            No report is available for this task yet.
         </div>
         {% endif %}
      </div>
   </div>
</div>
{% endblock body %}
