<!-- flat flask-admin template with sidebar, UrlProbe dark theme -->
<!DOCTYPE html>
<html>
   <head>
      <title>UrlProbe - Error</title>
      <link rel="icon" type="image/png" href="/static/urlprobe_icon.png">
      <style>
         html,
         body {
         height: 100%;
         margin: 0;
         padding: 0;
         width: 100%;
         font-family: 'IBM Plex Mono', monospace;
         background-color: oklch(0.16 0.006 260);
         color: oklch(0.92 0.005 260);
         }
         body {
         display: table;
         }
         .typewriter {
         text-align: center;
         display: table-cell;
         vertical-align: middle;
         }
         .typewriter a {
         color: oklch(0.85 0.1 264);
         }
         .typewriter h1 {
         border-right: 5px solid oklch(0.62 0.19 264);
         display: inline-block;
         white-space: nowrap;
         overflow: hidden;
         animation: typing 4s steps(30, end), blinkingcursor .5s step-end infinite;
         }
         @keyframes blinkingcursor {
         from,
         to {
         border-color: transparent
         }
         50% {
         border-color: oklch(0.62 0.19 264);
         }
         }
      </style>
   </head>
   <body>
      <div class="typewriter">
         <h1>Nice Job, you broke me?!</h1>
         <br>
         {{ task }} <a href={{ error }}> Home </a>
      </div>
   </body>
</html>
