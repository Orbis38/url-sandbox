{% extends 'admin/master.html' %}
{% block body %}
{{ super() }}
<div class="up-kpi-grid">
   {% for key,value in stats.items() %}
   <div class="up-kpi">
      <div class="up-kpi-label" title="{{ key }}">{{ key }}</div>
      <div class="up-kpi-value">{{ value }}</div>
   </div>
   {% endfor %}
</div>
{% endblock body %}
